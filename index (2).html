
<style>
  .fp-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .fp-header { margin-bottom: 1.5rem; }
  .fp-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .fp-sub { font-size: 14px; color: var(--color-text-secondary); margin: 0; }
  .step-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .step-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; text-align: center; }
  .step-card:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .step-card.active { border: 1.5px solid #534AB7; background: #EEEDFE; }
  .step-num { font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 6px; font-weight: 500; letter-spacing: 0.04em; }
  .step-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .step-desc { font-size: 11px; color: var(--color-text-secondary); margin: 0; line-height: 1.4; }
  .step-card.active .step-num { color: #534AB7; }
  .step-card.active .step-label { color: #3C3489; }

  .preview-area { display: flex; gap: 1.5rem; align-items: flex-start; }
  .finger-viz { flex: 0 0 200px; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sensor-wrap { position: relative; width: 120px; height: 120px; }
  .sensor-bg { width: 120px; height: 120px; border-radius: 12px; background: var(--color-background-primary); border: 1.5px dashed var(--color-border-secondary); display: flex; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
  .sensor-label { font-size: 11px; color: var(--color-text-tertiary); }
  .finger-svg { position: absolute; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), top 0.4s, left 0.4s; }
  .coverage-label { font-size: 12px; color: var(--color-text-secondary); }
  .coverage-bar-wrap { width: 100%; background: var(--color-background-primary); border-radius: 4px; height: 6px; border: 0.5px solid var(--color-border-tertiary); overflow: hidden; }
  .coverage-bar { height: 100%; border-radius: 4px; background: #534AB7; transition: width 0.4s; }

  .guide-panel { flex: 1; background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.25rem; }
  .guide-step-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 8px; }
  .guide-instruction { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 1rem; line-height: 1.6; }
  .checklist { list-style: none; padding: 0; margin: 0 0 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .checklist li { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); }
  .check-icon { width: 18px; height: 18px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .check-icon i { font-size: 11px; color: #534AB7; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn { flex: 1; padding: 8px 0; font-size: 13px; font-weight: 500; border-radius: var(--border-radius-md); cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); transition: background 0.15s; }
  .nav-btn:hover { background: var(--color-background-secondary); }
  .nav-btn.primary { background: #534AB7; color: #fff; border-color: #534AB7; }
  .nav-btn.primary:hover { background: #3C3489; border-color: #3C3489; }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }

  .progress-row { display: flex; gap: 6px; margin-bottom: 1rem; }
  .progress-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--color-border-tertiary); transition: background 0.3s; }
  .progress-dot.done { background: #534AB7; }
  .progress-dot.active { background: #AFA9EC; }

  .quality-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .quality-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .q-good { background: #EAF3DE; color: #27500A; }
  .q-warn { background: #FAEEDA; color: #633806; }
  .q-bad { background: #FCEBEB; color: #791F1F; }

  @media (max-width: 480px) {
    .preview-area { flex-direction: column; }
    .finger-viz { flex: unset; width: 100%; box-sizing: border-box; }
  }
</style>

<div class="fp-wrap">
  <h2 class="sr-only">지문 등록 품질 향상을 위한 단계별 등록 도우미 프로그램</h2>
  <div class="fp-header">
    <p class="fp-title"><i class="ti ti-fingerprint" aria-hidden="true" style="font-size:20px; vertical-align:-3px; margin-right:6px; color:#534AB7;"></i>지문 등록 도우미</p>
    <p class="fp-sub">5단계를 모두 완료하면 다양한 각도의 지문이 등록되어 인식률이 크게 향상됩니다.</p>
  </div>

  <div class="step-grid" id="stepGrid"></div>

  <div class="preview-area">
    <div class="finger-viz">
      <div style="font-size:12px; font-weight:500; color:var(--color-text-secondary); align-self:flex-start;">센서 미리보기</div>
      <div class="sensor-wrap" id="sensorWrap">
        <div class="sensor-bg"><span class="sensor-label">센서</span></div>
        <svg id="fingerSvg" class="finger-svg" width="70" height="80" viewBox="0 0 70 80" style="top:20px; left:25px;">
          <ellipse cx="35" cy="48" rx="22" ry="28" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
          <ellipse cx="35" cy="36" rx="16" ry="20" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <ellipse cx="35" cy="36" rx="9" ry="12" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
          <ellipse cx="35" cy="36" rx="4" ry="6" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.3"/>
        </svg>
      </div>
      <div style="width:100%; margin-top:4px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
          <span class="coverage-label">등록 커버리지</span>
          <span class="coverage-label" id="coveragePct">0%</span>
        </div>
        <div class="coverage-bar-wrap"><div class="coverage-bar" id="coverageBar" style="width:0%"></div></div>
      </div>
      <div style="margin-top:8px; width:100%;">
        <div style="font-size:11px; color:var(--color-text-tertiary); margin-bottom:6px;">완료된 영역</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px;" id="areaGrid"></div>
      </div>
    </div>

    <div class="guide-panel">
      <div class="progress-row" id="progressRow"></div>
      <div class="quality-row" id="qualityRow"></div>
      <p class="guide-step-title" id="guideTitle"></p>
      <p class="guide-instruction" id="guideInstruction"></p>
      <ul class="checklist" id="checklist"></ul>
      <div class="nav-btns">
        <button class="nav-btn" id="btnPrev" onclick="changeStep(-1)"><i class="ti ti-arrow-left" aria-hidden="true"></i> 이전</button>
        <button class="nav-btn primary" id="btnNext" onclick="changeStep(1)">다음 <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
const steps = [
  {
    label: "정면 접촉",
    desc: "지문 중심 등록",
    icon: "ti-hand-stop",
    transform: "translate(25px, 20px) rotate(0deg)",
    coverage: 20,
    area: "중앙",
    quality: [{label:"필수 단계", cls:"q-good"}],
    title: "1단계 — 정면으로 올바르게 접촉",
    instruction: "손가락 중심부가 센서 정중앙에 오도록 올려놓으세요. 이 단계에서 지문의 핵심 패턴(중심부 융선)이 등록됩니다.",
    checks: ["손가락을 세우지 않고 평평하게 눕힘", "중심이 센서 중앙에 위치", "적당한 압력으로 1~2초 유지"]
  },
  {
    label: "왼쪽 기울기",
    desc: "좌측 영역 등록",
    icon: "ti-hand-stop",
    transform: "translate(10px, 22px) rotate(-25deg)",
    coverage: 40,
    area: "좌측",
    quality: [{label:"좌측 영역", cls:"q-good"}, {label:"기울기 15~30°", cls:"q-warn"}],
    title: "2단계 — 왼쪽으로 약간 기울여 접촉",
    instruction: "손가락을 왼쪽으로 15~30° 기울인 상태로 센서에 올려놓으세요. 지문의 왼쪽 가장자리 영역이 등록됩니다.",
    checks: ["손가락 왼쪽 측면이 센서에 닿도록", "너무 많이 기울이면 인식 실패 가능", "가볍게 눌러 1초 유지"]
  },
  {
    label: "오른쪽 기울기",
    desc: "우측 영역 등록",
    icon: "ti-hand-stop",
    transform: "translate(38px, 22px) rotate(25deg)",
    coverage: 60,
    area: "우측",
    quality: [{label:"우측 영역", cls:"q-good"}, {label:"기울기 15~30°", cls:"q-warn"}],
    title: "3단계 — 오른쪽으로 약간 기울여 접촉",
    instruction: "이번에는 오른쪽으로 15~30° 기울인 상태로 접촉하세요. 2단계와 대칭되는 우측 영역이 보완됩니다.",
    checks: ["손가락 오른쪽 측면이 센서에 닿도록", "2단계와 같은 기울기 각도 유지", "가볍게 눌러 1초 유지"]
  },
  {
    label: "위쪽 부분",
    desc: "손가락 끝 등록",
    icon: "ti-hand-stop",
    transform: "translate(25px, 5px) rotate(0deg)",
    coverage: 80,
    area: "상단",
    quality: [{label:"끝부분 영역", cls:"q-good"}, {label:"위치 이동 필요", cls:"q-warn"}],
    title: "4단계 — 손가락 끝(위쪽 부분) 접촉",
    instruction: "손가락을 약간 아래로 내려서 손가락 끝 부분이 센서에 닿도록 하세요. 지문 상단부 패턴이 등록됩니다.",
    checks: ["손가락 끝이 센서 중앙~위쪽에 위치", "평소보다 손가락을 약간 위로 올림", "압력은 평소와 동일하게"]
  },
  {
    label: "아래쪽 부분",
    desc: "손가락 아랫부분",
    icon: "ti-hand-stop",
    transform: "translate(25px, 38px) rotate(0deg)",
    coverage: 100,
    area: "하단",
    quality: [{label:"등록 완료", cls:"q-good"}],
    title: "5단계 — 손가락 아랫부분 접촉",
    instruction: "마지막으로 손가락을 위로 올려 아랫부분이 센서에 닿도록 하세요. 이제 지문 전체 영역이 고르게 등록됩니다.",
    checks: ["손가락 아랫부분이 센서에 닿도록", "손가락을 약간 위 방향으로 당김", "5단계 완료 시 등록 버튼 클릭"]
  }
];

const completedSteps = new Set();
let current = 0;

function renderStepGrid() {
  const grid = document.getElementById('stepGrid');
  grid.innerHTML = steps.map((s,i) => `
    <div class="step-card ${i===current?'active':''}" onclick="goStep(${i})" id="sc${i}">
      <p class="step-num">${i+1}단계 ${completedSteps.has(i)?'<i class="ti ti-check" style="color:#534AB7"></i>':''}</p>
      <p class="step-label">${s.label}</p>
      <p class="step-desc">${s.desc}</p>
    </div>
  `).join('');
}

function renderAreaGrid() {
  const areas = steps.map((s,i) => ({label: s.area, done: completedSteps.has(i)}));
  document.getElementById('areaGrid').innerHTML = areas.map(a => `
    <div style="font-size:11px; padding:3px 6px; border-radius:4px; text-align:center;
      background:${a.done?'#EEEDFE':'var(--color-background-secondary)'};
      color:${a.done?'#3C3489':'var(--color-text-tertiary)'};
      border: 0.5px solid ${a.done?'#AFA9EC':'var(--color-border-tertiary)'};
      font-weight:${a.done?'500':'400'};">
      ${a.done?'<i class="ti ti-check" style="font-size:10px; vertical-align:-1px;"></i> ':''}${a.label}
    </div>
  `).join('');
}

function renderProgress() {
  const row = document.getElementById('progressRow');
  row.innerHTML = steps.map((_,i)=>`<div class="progress-dot ${i<current?'done':i===current?'active':''}"></div>`).join('');
}

function renderGuide() {
  const s = steps[current];
  document.getElementById('guideTitle').textContent = s.title;
  document.getElementById('guideInstruction').textContent = s.instruction;
  document.getElementById('checklist').innerHTML = s.checks.map(c=>`
    <li>
      <div class="check-icon"><i class="ti ti-check" aria-hidden="true"></i></div>
      ${c}
    </li>
  `).join('');
  document.getElementById('qualityRow').innerHTML = s.quality.map(q=>`<span class="quality-badge ${q.cls}">${q.label}</span>`).join('');

  const covered = completedSteps.size;
  const pct = Math.round((covered / steps.length) * 100);
  document.getElementById('coverageBar').style.width = pct + '%';
  document.getElementById('coveragePct').textContent = pct + '%';

  document.getElementById('btnPrev').disabled = current === 0;
  const btn = document.getElementById('btnNext');
  if (current === steps.length - 1) {
    btn.innerHTML = '등록 완료 <i class="ti ti-check" aria-hidden="true"></i>';
    btn.onclick = () => {
      completedSteps.add(current);
      renderAll();
      sendPrompt('지문 5단계 등록이 완료되었습니다. 등록 품질 리포트와 다음 권장 사항을 알려주세요.');
    };
  } else {
    btn.innerHTML = '다음 <i class="ti ti-arrow-right" aria-hidden="true"></i>';
    btn.onclick = () => changeStep(1);
  }
}

function renderFinger() {
  const s = steps[current];
  document.getElementById('fingerSvg').style.transform = s.transform;
  document.getElementById('fingerSvg').style.top = '';
  document.getElementById('fingerSvg').style.left = '';
}

function renderAll() {
  renderStepGrid();
  renderProgress();
  renderGuide();
  renderFinger();
  renderAreaGrid();
}

function goStep(i) {
  completedSteps.add(current);
  current = i;
  renderAll();
}

function changeStep(dir) {
  completedSteps.add(current);
  current = Math.max(0, Math.min(steps.length - 1, current + dir));
  renderAll();
}

renderAll();
</script>
